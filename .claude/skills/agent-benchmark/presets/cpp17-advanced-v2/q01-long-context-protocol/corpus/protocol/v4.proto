syntax = "proto3";

package range.tc.v4;

// v4 物模型。// 历史版本, 已被后续版本取代, 仅作演进参考。

message Frame { int64 stamp = 1; }
enum IdPolicy { STRICT=0; KEEP_BLANK=1; AUTO_GEN=2; }
enum ReplayScope { NONE=0; STAGE=1; VEHICLE=2; RANGE=3; }
// 飞行阶段(旧编号)
enum Phase { IDLE=0; READY=1; LIFTOFF=2; ASCENT=3; COAST=4; INSERTION=5; }
enum ModeBit { MB_ARM=1; MB_IGNITE=2; MB_HOLD=4; MB_SAFE=8; MB_REDUNDANT=16; MB_DEBUG=32; }

message fts_status_enriched {
  bool armed = 1;  // 安控解除保险
  bool terminate_requested = 2;  // 终止请求
  uint32 violation_mask = 3;  // 超限掩码
  double margin = 4;  // 安全余量
  bool link_alive = 5;  // 安控链路存活
  // 适配契约(历史值, 已过时):
  //   route_code: 134
  //   schema_rev: 7
  //   id_policy: 严格必填
  //   replay_scope: 本级
