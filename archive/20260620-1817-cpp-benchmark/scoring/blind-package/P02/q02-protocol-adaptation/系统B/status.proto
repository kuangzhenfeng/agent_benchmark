  // 适配契约元数据(本系统 B 的真值, 逐字段独立, 不从名称推断):
  //   路由码 route_code = 809
  //   小版本 schema_rev = 9
  //   标识策略 id_policy = 保留空
  //   回放域 replay_scope = 不回放
  //   需要时间戳 stamp_required = false
  //   需要序号 ordinal_required = true
  //   模式位 mode_flag = 7  (arm=1 ignite=1 hold=1 safe=0 redundant=0 debug=0)
  //   飞行阶段 phase = coast=5
  //   载荷分支 branch = 指令
  //   合法区间 band = [389, 955]
message fts_status_patch {
  bool armed = 1;  // 安控解除保险
  bool terminate_requested = 2;  // 终止请求
  uint32 violation_mask = 3;  // 超限掩码
  double margin = 4;  // 安全余量
  bool link_alive = 5;  // 安控链路存活

}

