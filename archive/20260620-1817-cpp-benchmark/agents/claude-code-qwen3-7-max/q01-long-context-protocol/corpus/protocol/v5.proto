syntax = "proto3";

package range.tc.v5;

// v5 物模型。// 历史版本, 已被后续版本取代, 仅作演进参考。

message Frame { int64 stamp = 1; }
enum IdPolicy { STRICT=0; KEEP_BLANK=1; AUTO_GEN=2; }
enum ReplayScope { NONE=0; STAGE=1; VEHICLE=2; RANGE=3; }
// 飞行阶段(v5 起重编号, 新增 RESERVED 占位)
enum Phase { IDLE=0; STANDBY=1; BOOST=2; ASCENT=3; RESERVED=4; COAST=5; INSERTION=6; }
enum ModeBit { MB_ARM=1; MB_IGNITE=2; MB_HOLD=4; MB_SAFE=8; MB_REDUNDANT=16; MB_DEBUG=32; }

message thermal_sample_bak {
  double skin_temp_c = 1;  // 蒙皮温度
  double bay_temp_c = 2;  // 舱内温度
  uint32 heater_mask = 3;  // 加热器掩码
  double gradient = 4;  // 温度梯度
  bool overtemp = 5;  // 过温
  // 适配契约(历史值, 已过时):
  //   route_code: 485
  //   schema_rev: 9
  //   id_policy: 空则生成
  //   replay_scope: 本级
  //   stamp_required: true
  //   ordinal_required: false
  //   mode_flag: 10
  //   phase_value: 0
  //   branch: 指令
}

message thrust_report_patches {
  double actual_thrust_kn = 1;  // 实际推力
  double chamber_pressure_mpa = 2;  // 燃烧室压强
