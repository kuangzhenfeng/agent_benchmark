<?xml version="1.0" encoding="UTF-8"?>
<!-- 一次 Task 的真实运行时流转。重试策略只判断资格；当前实现没有消费 delay 数值来等待。 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 980" width="1500" height="980" data-style="dataflow">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10z" fill="#356a92"/></marker>
    <marker id="retryArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10z" fill="#c06b12"/></marker>
    <style>
      .title { font: 700 30px sans-serif; fill: #152235; } .subtitle { font: 15px sans-serif; fill: #5a6b7d; }
      .lane-title { font: 700 16px sans-serif; fill: #45617b; letter-spacing: 1px; }
      .node rect { rx: 13; stroke-width: 2; } .node text { font: 700 17px sans-serif; fill: #182b3d; text-anchor: middle; } .detail { font: 13px sans-serif !important; fill: #5d7082 !important; font-weight: 400 !important; }
      .flow { fill: none; stroke: #356a92; stroke-width: 2.5; marker-end: url(#arrow); } .retry { fill: none; stroke: #c06b12; stroke-width: 3; stroke-dasharray: 8 5; marker-end: url(#retryArrow); }
      .edge-label { font: 13px sans-serif; fill: #356a92; } .retry-label { font: 13px sans-serif; fill: #a65509; } .note { font: 14px sans-serif; fill: #6b5560; }
    </style>
  </defs>
  <rect width="1500" height="980" fill="#f8fbfe"/>
  <text x="65" y="60" class="title">TaskForge 任务数据流</text>
  <text x="65" y="88" class="subtitle">提交 → 优先级入队 → Worker 执行 → 结果回调 → 成功/失败结算；橙色反馈环表示重试。</text>
  <rect x="50" y="120" width="1400" height="235" rx="18" fill="#edf6ff" stroke="#a6c9e5"/>
  <text x="75" y="150" class="lane-title">提交与派发</text>
  <rect x="50" y="380" width="1400" height="245" rx="18" fill="#effaf2" stroke="#a6d4b3"/>
  <text x="75" y="410" class="lane-title">并发执行与回传</text>
  <rect x="50" y="650" width="1400" height="260" rx="18" fill="#fff8ed" stroke="#e7c384"/>
  <text x="75" y="680" class="lane-title">结算、重试和终态广播</text>
  <g data-role="edges">
    <path class="flow" data-from="TaskProducer" data-to="Scheduler" data-kind="flow" d="M 290 235 L 410 235"/>
    <path class="flow" data-from="Scheduler" data-to="ITaskStore" data-kind="flow" d="M 570 215 C 650 175, 705 175, 775 215"/>
    <path class="flow" data-from="Scheduler" data-to="TaskQueue" data-kind="flow" d="M 570 255 C 650 300, 705 300, 775 255"/>
    <path class="flow" data-from="TaskQueue" data-to="Worker" data-kind="flow" d="M 925 270 L 925 465"/>
    <path class="flow" data-from="Worker" data-to="TaskWork" data-kind="flow" d="M 1040 495 L 1145 495"/>
    <path class="flow" data-from="TaskWork" data-to="Worker" data-kind="flow" d="M 1145 535 L 1040 535"/>
    <path class="flow" data-from="Worker" data-to="Scheduler" data-kind="flow" d="M 880 465 C 725 410, 610 395, 505 300"/>
    <path class="flow" data-from="Scheduler" data-to="IRetryPolicy" data-kind="flow" d="M 535 735 C 645 695, 705 695, 775 735"/>
    <path class="flow" data-from="Scheduler" data-to="ITaskStore" data-kind="flow" d="M 485 710 C 540 580, 720 390, 825 300"/>
    <path class="flow" data-from="Scheduler" data-to="MetricsCollector" data-kind="flow" d="M 570 760 L 775 820"/>
    <path class="flow" data-from="Scheduler" data-to="INotifier" data-kind="flow" d="M 570 775 C 745 865, 905 855, 1045 785"/>
    <path class="flow" data-from="INotifier" data-to="TerminalSinks" data-kind="flow" d="M 1205 770 L 1320 770"/>
    <path class="retry" data-from="Scheduler" data-to="TaskQueue" data-kind="flow" d="M 410 750 C 220 700, 195 345, 775 275"/>
  </g>
  <g data-role="nodes">
    <g data-id="TaskProducer" data-kind="external-input" class="node"><rect x="115" y="205" width="175" height="60" fill="#fff" stroke="#5597c7"/><text x="202" y="230">调用方 / main</text><text x="202" y="251" class="detail">submit / submitBatch</text></g>
    <g data-id="Scheduler" data-kind="orchestrator" class="node"><rect x="410" y="195" width="160" height="80" fill="#fff" stroke="#3c8b65"/><text x="490" y="228">Scheduler</text><text x="490" y="252" class="detail">分配 ID、结算</text></g>
    <g data-id="ITaskStore" data-kind="state-store" class="node"><rect x="775" y="180" width="180" height="65" fill="#fff" stroke="#7f6ab0"/><text x="865" y="208">ITaskStore</text><text x="865" y="230" class="detail">save / load / status</text></g>
    <g data-id="TaskQueue" data-kind="queue" class="node"><rect x="775" y="260" width="180" height="65" fill="#fff" stroke="#3c8b65"/><text x="865" y="288">TaskQueue</text><text x="865" y="310" class="detail">按优先级、同级 FIFO</text></g>
    <g data-id="Worker" data-kind="worker" class="node"><rect x="810" y="465" width="230" height="100" fill="#fff" stroke="#3c8b65"/><text x="925" y="495">Worker × N</text><text x="925" y="519" class="detail">blocking_pop；attempt + 1</text><text x="925" y="541" class="detail">捕获异常为失败结果</text></g>
    <g data-id="TaskWork" data-kind="workload" class="node"><rect x="1145" y="465" width="180" height="100" fill="#fff" stroke="#5597c7"/><text x="1235" y="495">Task::work</text><text x="1235" y="519" class="detail">业务可调用对象</text><text x="1235" y="541" class="detail">0 成功；非 0 失败</text></g>
    <g data-id="IRetryPolicy" data-kind="policy" class="node"><rect x="775" y="710" width="180" height="65" fill="#fff" stroke="#c98b36"/><text x="865" y="738">IRetryPolicy</text><text x="865" y="760" class="detail">next_delay_ms(attempt)</text></g>
    <g data-id="MetricsCollector" data-kind="metrics" class="node"><rect x="775" y="795" width="180" height="65" fill="#fff" stroke="#c98b36"/><text x="865" y="823">MetricsCollector</text><text x="865" y="845" class="detail">submit / success / fail / retry</text></g>
    <g data-id="INotifier" data-kind="notifier" class="node"><rect x="1045" y="740" width="160" height="65" fill="#fff" stroke="#c98b36"/><text x="1125" y="768">INotifier</text><text x="1125" y="790" class="detail">仅终态事件</text></g>
    <g data-id="TerminalSinks" data-kind="external-output" class="node"><rect x="1320" y="740" width="100" height="65" fill="#fff" stroke="#c98b36"/><text x="1370" y="768">stdout</text><text x="1370" y="790" class="detail">回调</text></g>
  </g>
  <text x="300" y="220" class="edge-label">Task</text><text x="635" y="170" class="edge-label">保存 Queued</text><text x="635" y="322" class="edge-label">Queued Task</text>
  <text x="945" y="375" class="edge-label">优先级出队</text><text x="1050" y="483" class="edge-label">执行</text><text x="1060" y="558" class="edge-label">code / exception</text>
  <text x="590" y="390" class="edge-label">TaskResult（运行时回调）</text><text x="610" y="690" class="edge-label">失败资格判断</text><text x="590" y="575" class="edge-label">Succeeded / Failed / Retrying</text>
  <text x="625" y="825" class="edge-label">计数</text><text x="900" y="890" class="edge-label">task.succeeded / task.failed + TaskResult</text>
  <text x="175" y="660" class="retry-label">失败且尚可重试：load → attempt 同步、标为 Retrying、save → 再次 push</text>
  <rect x="90" y="838" width="590" height="47" rx="8" fill="#fff1e5" stroke="#ebaa61"/>
  <text x="110" y="867" class="note">实现注意：策略返回的 delay 仅用于 has_value() 判断，Scheduler 并未 sleep 或延迟入队。</text>
</svg>
