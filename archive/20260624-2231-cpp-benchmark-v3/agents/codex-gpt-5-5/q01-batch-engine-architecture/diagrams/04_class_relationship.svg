<?xml version="1.0" encoding="UTF-8"?>
<!-- UML 风格关系图：空心三角表示实现/继承，菱形表示成员拥有/共享聚合。 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1080" width="1600" height="1080" data-style="class">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#53697d"/></marker>
    <marker id="triangle" viewBox="0 0 14 14" refX="12" refY="7" markerWidth="10" markerHeight="10" orient="auto"><path d="M 1 1 L 13 7 L 1 13 z" fill="#fff" stroke="#53697d" stroke-width="1.5"/></marker>
    <style>
      .title { font: 700 30px sans-serif; fill: #152235; } .subtitle { font: 15px sans-serif; fill: #5a6b7d; }
      .node rect { rx: 8; stroke-width: 1.7; } .node .name { font: 700 17px sans-serif; fill: #17283a; text-anchor: middle; } .node .member { font: 13px monospace; fill: #536577; text-anchor: start; } .node .stereo { font: italic 13px sans-serif; fill: #7658a7; text-anchor: middle; }
      .interface rect { fill: #fbf9ff; stroke: #8e72b4; } .class rect { fill: #fff; stroke: #528fb9; } .concrete rect { fill: #f4fbf6; stroke: #5aa174; } .muted rect { fill: #f7f7f7; stroke: #9ca3af; stroke-dasharray: 6 4; }
      .edge { fill: none; stroke: #53697d; stroke-width: 1.8; marker-end: url(#arrow); } .inherit { fill: none; stroke: #53697d; stroke-width: 1.8; marker-end: url(#triangle); } .compose { fill: none; stroke: #2f7b58; stroke-width: 2; marker-end: url(#arrow); } .aggregate { fill: none; stroke: #8b6bba; stroke-width: 2; stroke-dasharray: 5 3; marker-end: url(#arrow); }
      .rel { font: 12px sans-serif; fill: #536577; } .legend { font: 13px sans-serif; fill: #4c6072; }
    </style>
  </defs>
  <rect width="1600" height="1080" fill="#fafcff"/>
