  <rect x="70" y="1005" width="1380" height="44" rx="8" fill="#f2f7fb" stroke="#b7c9d9"/>
  <text x="90" y="1033" class="legend">实线绿：组合/值成员（Scheduler 自有 queue_、pool_、retry_）；紫色虚线：shared_ptr 聚合；三角：实现接口；普通箭头：使用/引用。Scheduler 不指向任何具体 Store/Policy/Notifier 实现。</text>
