  <g data-role="nodes">
    <g data-id="main" data-kind="composition-root" class="node class"><rect x="70" y="140" width="150" height="100"/><text x="145" y="172" class="name">main</text><line x1="70" y1="186" x2="220" y2="186" stroke="#528fb9"/><text x="82" y="212" class="member">装配具体对象</text><text x="82" y="230" class="member">调用 run()</text></g>
    <g data-id="Scheduler" data-kind="class" class="node class"><rect x="440" y="135" width="250" height="130"/><text x="565" y="167" class="name">Scheduler</text><line x1="440" y1="181" x2="690" y2="181" stroke="#528fb9"/><text x="452" y="205" class="member">TaskQueue queue_</text><text x="452" y="225" class="member">WorkerPool pool_</text><text x="452" y="245" class="member">抽象服务的指针/引用</text></g>
