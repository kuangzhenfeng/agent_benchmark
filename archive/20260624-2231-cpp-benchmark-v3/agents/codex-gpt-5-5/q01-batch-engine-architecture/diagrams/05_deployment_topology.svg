<?xml version="1.0" encoding="UTF-8"?>
<!-- 默认配置的一个进程内运行时拓扑：1 个主线程、1 个 stopper 线程、4 个 worker 线程。 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1550 1030" width="1550" height="1030" data-style="deployment">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10z" fill="#45637b"/></marker>
    <marker id="callbackArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10z" fill="#c06b12"/></marker>
    <style>
      .title { font: 700 30px sans-serif; fill: #152235; } .subtitle { font: 15px sans-serif; fill: #5a6b7d; }
      .zone { rx: 18; stroke-width: 2; } .zone-title { font: 700 18px sans-serif; fill: #294a66; }
      .node rect { rx: 10; stroke-width: 1.6; } .node text { font: 700 16px sans-serif; fill: #17283a; text-anchor: middle; } .detail { font: 12px sans-serif !important; font-weight: 400 !important; fill: #5d7082 !important; }
      .contains { fill: none; stroke: #6186a3; stroke-width: 1.6; marker-end: url(#arrow); } .connects { fill: none; stroke: #356a92; stroke-width: 2.2; marker-end: url(#arrow); } .callback { fill: none; stroke: #c06b12; stroke-width: 2.4; stroke-dasharray: 7 5; marker-end: url(#callbackArrow); } .runs { fill: none; stroke: #3c8b65; stroke-width: 2; marker-end: url(#arrow); }
      .label { font: 12px sans-serif; fill: #45637b; } .note { font: 13px sans-serif; fill: #64748b; }
    </style>
  </defs>
  <rect width="1550" height="1030" fill="#f8fbfe"/>
  <text x="60" y="58" class="title">TaskForge 部署 / 运行时拓扑</text>
  <text x="60" y="86" class="subtitle">`ConfigLoader::default_for(&quot;default&quot;)` 产生 4 个 worker；所有组件均在单一进程内，TaskQueue 是跨线程的共享汇合点。</text>
  <rect x="45" y="120" width="1460" height="735" fill="#eef6ff" stroke="#84add0" class="zone"/>
  <text x="70" y="152" class="zone-title">TaskForge demo 进程（单个 OS 进程）</text>
  <rect x="75" y="180" width="420" height="625" fill="#fff" stroke="#aac5dc" class="zone"/>
  <text x="98" y="212" class="zone-title">主线程</text>
  <rect x="530" y="180" width="520" height="625" fill="#fff" stroke="#aac5dc" class="zone"/>
  <text x="553" y="212" class="zone-title">共享进程内对象</text>
  <rect x="1085" y="180" width="380" height="625" fill="#fff" stroke="#aac5dc" class="zone"/>
  <text x="1108" y="212" class="zone-title">WorkerPool：4 个 OS 线程</text>
  <g data-role="edges">
    <path class="contains" data-from="TaskForgeProcess" data-to="MainThread" data-kind="contains" d="M 145 165 L 180 240"/>
    <path class="contains" data-from="TaskForgeProcess" data-to="SharedServices" data-kind="contains" d="M 310 165 L 740 240"/>
    <path class="contains" data-from="TaskForgeProcess" data-to="WorkerPool" data-kind="contains" d="M 405 165 L 1240 240"/>
    <path class="runs" data-from="MainThread" data-to="Scheduler" data-kind="runs-on" d="M 280 310 L 280 355"/>
    <path class="connects" data-from="Scheduler" data-to="TaskQueue" data-kind="connects" d="M 385 405 L 610 405"/>
    <path class="connects" data-from="Scheduler" data-to="InMemoryTaskStore" data-kind="connects" d="M 385 425 C 490 520, 545 520, 610 520"/>
    <path class="connects" data-from="Scheduler" data-to="MetricsCollector" data-kind="connects" d="M 385 435 C 495 650, 545 650, 610 650"/>
    <path class="connects" data-from="Scheduler" data-to="CompositeNotifier" data-kind="connects" d="M 385 445 C 480 730, 540 740, 610 740"/>
    <path class="contains" data-from="Scheduler" data-to="WorkerPool" data-kind="contains" d="M 385 390 C 650 300, 930 300, 1140 300"/>
    <path class="runs" data-from="WorkerPool" data-to="WorkerThread1" data-kind="runs-on" d="M 1235 350 L 1160 385"/>
    <path class="runs" data-from="WorkerPool" data-to="WorkerThread2" data-kind="runs-on" d="M 1315 350 L 1370 385"/>
    <path class="runs" data-from="WorkerPool" data-to="WorkerThread3" data-kind="runs-on" d="M 1235 350 L 1160 515"/>
    <path class="runs" data-from="WorkerPool" data-to="WorkerThread4" data-kind="runs-on" d="M 1315 350 L 1370 515"/>
    <path class="connects" data-from="WorkerThread1" data-to="TaskQueue" data-kind="connects" d="M 1120 430 C 955 430, 800 430, 750 430"/>
    <path class="connects" data-from="WorkerThread2" data-to="TaskQueue" data-kind="connects" d="M 1330 430 C 1110 460, 860 470, 750 445"/>
    <path class="connects" data-from="WorkerThread3" data-to="TaskQueue" data-kind="connects" d="M 1120 560 C 960 535, 800 505, 750 470"/>
    <path class="connects" data-from="WorkerThread4" data-to="TaskQueue" data-kind="connects" d="M 1330 560 C 1120 590, 880 550, 750 475"/>
    <path class="callback" data-from="WorkerPool" data-to="Scheduler" data-kind="callback" d="M 1140 325 C 850 250, 555 260, 385 365"/>
    <path class="callback" data-from="StopperThread" data-to="Scheduler" data-kind="callback" d="M 270 720 C 450 690, 470 505, 385 450"/>
    <path class="connects" data-from="CompositeNotifier" data-to="Stdout" data-kind="connects" d="M 750 740 L 875 740"/>
  </g>
  <g data-role="nodes">
    <g data-id="TaskForgeProcess" data-kind="process" class="node"><rect x="90" y="135" width="190" height="45" fill="#dceeff" stroke="#5c92bd"/><text x="185" y="164">TaskForge Process</text></g>
    <g data-id="MainThread" data-kind="thread" class="node"><rect x="155" y="250" width="250" height="60" fill="#eefaf2" stroke="#56a473"/><text x="280" y="276">main() 线程</text><text x="280" y="297" class="detail">提交任务，阻塞在 scheduler.run()</text></g>
    <g data-id="Scheduler" data-kind="runtime-instance" class="node"><rect x="175" y="355" width="210" height="95" fill="#fff" stroke="#56a473"/><text x="280" y="384">Scheduler 实例</text><text x="280" y="407" class="detail">含 TaskQueue、WorkerPool</text><text x="280" y="429" class="detail">持有共享服务指针/引用</text></g>
    <g data-id="StopperThread" data-kind="thread" class="node"><rect x="155" y="680" width="230" height="75" fill="#fff7ed" stroke="#d99242"/><text x="270" y="709">stopper 线程</text><text x="270" y="732" class="detail">800ms 后调用 scheduler.stop()</text></g>
    <g data-id="SharedServices" data-kind="runtime-container" class="node"><rect x="610" y="250" width="270" height="45" fill="#dceeff" stroke="#5c92bd"/><text x="745" y="279">共享服务实例</text></g>
    <g data-id="TaskQueue" data-kind="runtime-instance" class="node"><rect x="610" y="375" width="140" height="95" fill="#fff" stroke="#56a473"/><text x="680" y="404">TaskQueue</text><text x="680" y="427" class="detail">mutex + cv</text><text x="680" y="449" class="detail">优先级堆</text></g>
    <g data-id="InMemoryTaskStore" data-kind="runtime-instance" class="node"><rect x="610" y="490" width="180" height="65" fill="#fff" stroke="#7e69ad"/><text x="700" y="518">InMemoryTaskStore</text><text x="700" y="540" class="detail">默认实际装配</text></g>
    <g data-id="MetricsCollector" data-kind="runtime-instance" class="node"><rect x="610" y="620" width="180" height="65" fill="#fff" stroke="#7e69ad"/><text x="700" y="648">MetricsCollector</text><text x="700" y="670" class="detail">atomic counters</text></g>
    <g data-id="CompositeNotifier" data-kind="runtime-instance" class="node"><rect x="610" y="710" width="140" height="60" fill="#fff" stroke="#7e69ad"/><text x="680" y="738">Composite</text><text x="680" y="758" class="detail">Notifier</text></g>
    <g data-id="Stdout" data-kind="external-sink" class="node"><rect x="875" y="710" width="125" height="60" fill="#fff" stroke="#7e69ad"/><text x="937" y="738">stdout</text><text x="937" y="758" class="detail">console / callback</text></g>
    <g data-id="WorkerPool" data-kind="runtime-instance" class="node"><rect x="1140" y="250" width="190" height="100" fill="#fff" stroke="#56a473"/><text x="1235" y="280">WorkerPool</text><text x="1235" y="305" class="detail">config.worker_count = 4</text><text x="1235" y="328" class="detail">每 worker 一份回调</text></g>
    <g data-id="WorkerThread1" data-kind="thread" class="node"><rect x="1120" y="385" width="130" height="70" fill="#f3fbf6" stroke="#56a473"/><text x="1185" y="413">Worker #1</text><text x="1185" y="435" class="detail">OS thread</text></g>
    <g data-id="WorkerThread2" data-kind="thread" class="node"><rect x="1330" y="385" width="130" height="70" fill="#f3fbf6" stroke="#56a473"/><text x="1395" y="413">Worker #2</text><text x="1395" y="435" class="detail">OS thread</text></g>
    <g data-id="WorkerThread3" data-kind="thread" class="node"><rect x="1120" y="515" width="130" height="70" fill="#f3fbf6" stroke="#56a473"/><text x="1185" y="543">Worker #3</text><text x="1185" y="565" class="detail">OS thread</text></g>
    <g data-id="WorkerThread4" data-kind="thread" class="node"><rect x="1330" y="515" width="130" height="70" fill="#f3fbf6" stroke="#56a473"/><text x="1395" y="543">Worker #4</text><text x="1395" y="565" class="detail">OS thread</text></g>
  </g>
  <rect x="45" y="880" width="1460" height="105" rx="16" fill="#f6f7f8" stroke="#aeb8c2" stroke-dasharray="7 5"/>
  <text x="70" y="910" class="zone-title">已编译但默认 demo 不实例化（不属于上方运行时实例图）</text>
  <g data-role="nodes">
    <g data-id="PersistentTaskStore" data-kind="compiled-inactive" class="node"><rect x="85" y="928" width="210" height="40" fill="#fff" stroke="#9ca3af" stroke-dasharray="5 4"/><text x="190" y="953">PersistentTaskStore</text></g>
    <g data-id="FixedBackoffPolicy" data-kind="compiled-inactive" class="node"><rect x="330" y="928" width="190" height="40" fill="#fff" stroke="#9ca3af" stroke-dasharray="5 4"/><text x="425" y="953">FixedBackoffPolicy</text></g>
    <g data-id="TaskQueueLegacy" data-kind="compiled-inactive" class="node"><rect x="555" y="928" width="190" height="40" fill="#fff" stroke="#9ca3af" stroke-dasharray="5 4"/><text x="650" y="953">TaskQueueLegacy</text></g>
    <g data-id="ConsoleLogger" data-kind="compiled-inactive" class="node"><rect x="780" y="928" width="170" height="40" fill="#fff" stroke="#9ca3af" stroke-dasharray="5 4"/><text x="865" y="953">ConsoleLogger</text></g>
  </g>
  <text x="990" y="953" class="note">另：Scheduler::run_legacy() 与 reschedule() 存在实现，但 demo 未调用。</text>
</svg>
