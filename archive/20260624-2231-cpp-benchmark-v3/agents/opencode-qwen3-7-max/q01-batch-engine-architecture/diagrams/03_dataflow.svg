<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800"
     data-style="dataflow">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
    <marker id="arr-depends" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
    <marker id="arr-callback" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#e91e63"/>
    </marker>
    <marker id="arr-flow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0d47a1"/>
    </marker>
    <marker id="arr-retry" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#e65100"/>
    </marker>
    <marker id="arr-impl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0d47a1"/>
    </marker>
    <marker id="arr-uses" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#888"/>
    </marker>
    <marker id="arr-aggr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#e65100"/>
    </marker>
    <marker id="arr-comp" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2e7d32"/>
    </marker>
    <marker id="arr-conn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#444"/>
    </marker>
    <marker id="arr-cont" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1565c0"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="800" fill="#f8f9fa"/>
  <text x="600" y="38" font-family="sans-serif" font-size="21" font-weight="bold" text-anchor="middle" fill="#1a1a2e">TaskForge 数据流图 (Task 完整生命周期)</text>
  <g data-role="nodes">
  <g data-id="Caller" data-kind="actor">
    <rect x="60" y="100" width="165" height="55" rx="6" fill="#1565c0" filter="url(#shadow)"/>
    <text x="142" y="120" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">Caller</text>
    <text x="142" y="134" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">(提交 Task)</text>
  </g>
  <g data-id="Scheduler" data-kind="class">
    <rect x="60" y="200" width="165" height="60" rx="6" fill="#2e7d32" filter="url(#shadow)"/>
    <text x="142" y="223" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">Scheduler::submit</text>
    <text x="142" y="237" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">+submitBatch()</text>
  </g>
  <g data-id="ITaskStore-save" data-kind="interface">
    <rect x="60" y="305" width="165" height="55" rx="6" fill="#f57f17" filter="url(#shadow)"/>
    <text x="142" y="325" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">ITaskStore::save</text>
    <text x="142" y="339" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">(持久化状态)</text>
  </g>
  <g data-id="TaskQueue-push" data-kind="class">
    <rect x="260" y="200" width="175" height="60" rx="6" fill="#c62828" filter="url(#shadow)"/>
    <text x="347" y="223" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">TaskQueue::push</text>
    <text x="347" y="237" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">(priority pq)</text>
  </g>
  <g data-id="Metrics-submit" data-kind="class">
    <rect x="260" y="305" width="175" height="55" rx="6" fill="#5e35b1" filter="url(#shadow)"/>
    <text x="347" y="325" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">MetricsCollector</text>
    <text x="347" y="339" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">record_submit()</text>
  </g>
  <g data-id="Worker" data-kind="class">
    <rect x="470" y="200" width="175" height="60" rx="6" fill="#388e3c" filter="url(#shadow)"/>
    <text x="557" y="223" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">Worker::loop</text>
    <text x="557" y="237" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">blocking_pop → work()</text>
  </g>
  <g data-id="TaskResult" data-kind="class">
    <rect x="470" y="310" width="180" height="55" rx="6" fill="#ff8f00" filter="url(#shadow)"/>
    <text x="560" y="330" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">TaskResult</text>
    <text x="560" y="344" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">{id, ok, attempt, code}</text>
  </g>
  <g data-id="Scheduler-cb" data-kind="class">
    <rect x="690" y="200" width="230" height="60" rx="6" fill="#2e7d32" filter="url(#shadow)"/>
    <text x="805" y="223" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">Scheduler::handle_</text>
    <text x="805" y="237" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">completion (runtime cb)</text>
  </g>
  <g data-id="INotifier-ok" data-kind="interface">
    <rect x="690" y="100" width="210" height="55" rx="6" fill="#e65100" filter="url(#shadow)"/>
    <text x="795" y="120" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">INotifier::on_event</text>
    <text x="795" y="134" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">(task.succeeded)</text>
  </g>
  <g data-id="Store-update" data-kind="interface">
    <rect x="940" y="100" width="200" height="55" rx="6" fill="#f57f17" filter="url(#shadow)"/>
    <text x="1040" y="120" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">Store::update_status</text>
    <text x="1040" y="134" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">→ Succeeded → remove()</text>
  </g>
  <g data-id="IRetryPolicy" data-kind="interface">
    <rect x="690" y="310" width="225" height="60" rx="6" fill="#7b1fa2" filter="url(#shadow)"/>
    <text x="802" y="333" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">IRetryPolicy::</text>
    <text x="802" y="347" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">next_delay_ms(attempt)</text>
  </g>
  <g data-id="Retry-requeue" data-kind="class">
    <rect x="470" y="410" width="215" height="60" rx="6" fill="#c62828" filter="url(#shadow)"/>
    <text x="577" y="426" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">Store::load</text>
    <text x="577" y="440" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">+ TaskQueue::push</text>
    <text x="577" y="454" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">(重试入队)</text>
  </g>
  <g data-id="Metrics-retry" data-kind="class">
    <rect x="320" y="410" width="140" height="55" rx="6" fill="#5e35b1" filter="url(#shadow)"/>
    <text x="390" y="430" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">MetricsCollector</text>
    <text x="390" y="444" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">record_retry()</text>
  </g>
  <g data-id="INotifier-fail" data-kind="interface">
    <rect x="700" y="420" width="220" height="60" rx="6" fill="#b71c1c" filter="url(#shadow)"/>
    <text x="810" y="443" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">INotifier::on_event</text>
    <text x="810" y="457" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">(task.failed 终态)</text>
  </g>
  <g data-id="Metrics-fail" data-kind="class">
    <rect x="940" y="320" width="140" height="55" rx="6" fill="#5e35b1" filter="url(#shadow)"/>
    <text x="1010" y="340" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">MetricsCollector</text>
    <text x="1010" y="354" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">record_failure()</text>
  </g>
  <g data-id="INotifier-fail2" data-kind="interface">
    <rect x="940" y="420" width="140" height="55" rx="6" fill="#5e35b1" filter="url(#shadow)"/>
    <text x="1010" y="440" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">MetricsCollector</text>
    <text x="1010" y="454" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">record_success()</text>
  </g>
  </g>
  <g data-role="edges">
  <line data-from="Caller" data-to="Scheduler" data-kind="flow"
        x1="142" y1="155" x2="142" y2="200"
        stroke="#0d47a1" stroke-width="2" marker-end="url(#arr-flow)"/>
  <line data-from="Scheduler" data-to="ITaskStore-save" data-kind="flow"
        x1="142" y1="260" x2="142" y2="305"
        stroke="#0d47a1" stroke-width="2" marker-end="url(#arr-flow)"/>
  <line data-from="Scheduler" data-to="TaskQueue-push" data-kind="flow"
        x1="225" y1="230" x2="260" y2="230"
        stroke="#0d47a1" stroke-width="2" marker-end="url(#arr-flow)"/>
  <line data-from="Scheduler" data-to="Metrics-submit" data-kind="flow"
        x1="165" y1="260" x2="260" y2="332"
        stroke="#0d47a1" stroke-width="2" marker-end="url(#arr-flow)"/>
  <line data-from="TaskQueue-push" data-to="Worker" data-kind="flow"
        x1="435" y1="230" x2="470" y2="230"
        stroke="#0d47a1" stroke-width="2" marker-end="url(#arr-flow)"/>
  <text x='440' y='270' font-family='monospace' font-size='10' fill='#0d47a1'>Task (dequeued)</text>
  <line data-from="Worker" data-to="TaskResult" data-kind="flow"
        x1="557" y1="260" x2="560" y2="310"
        stroke="#0d47a1" stroke-width="2" marker-end="url(#arr-flow)"/>
  <text x='565' y='290' font-family='monospace' font-size='10' fill='#0d47a1'>TaskResult</text>
  <line data-from="TaskResult" data-to="Scheduler-cb" data-kind="flow"
        x1="650" y1="230" x2="690" y2="230"
        stroke="#0d47a1" stroke-width="2" marker-end="url(#arr-flow)"/>
  <text x='655' y='270' font-family='monospace' font-size='9' fill='#0d47a1'>runtime callback</text>
  <line data-from="Scheduler-cb" data-to="INotifier-ok" data-kind="flow"
        x1="805" y1="200" x2="795" y2="155"
        stroke="#2e7d32" stroke-width="2" marker-end="url(#arr-flow)"/>
  <line data-from="Scheduler-cb" data-to="Store-update" data-kind="flow"
        x1="920" y1="200" x2="1040" y2="155"
        stroke="#2e7d32" stroke-width="2" marker-end="url(#arr-flow)"/>
  <line data-from="Scheduler-cb" data-to="Metrics-retry" data-kind="flow"
        x1="920" y1="195" x2="940" y2="320"
        stroke="#2e7d32" stroke-width="2" marker-end="url(#arr-flow)" stroke-dasharray="4,3"/>
  <line data-from="Scheduler-cb" data-to="IRetryPolicy" data-kind="flow"
        x1="802" y1="260" x2="802" y2="310"
        stroke="#e65100" stroke-width="2" marker-end="url(#arr-retry)"/>
  <line data-from="IRetryPolicy" data-to="Retry-requeue" data-kind="flow"
        x1="690" y1="340" x2="577" y2="410"
        stroke="#e65100" stroke-width="2" marker-end="url(#arr-retry)"/>
  <line data-from="Retry-requeue" data-to="TaskQueue-push" data-kind="flow"
        x1="470" y1="410" x2="345" y2="255"
        stroke="#e65100" stroke-width="2" marker-end="url(#arr-retry)"/>
  <text x='375' y='350' font-family='monospace' font-size='10' fill='#e65100'>retry loop</text>
  <line data-from="Retry-requeue" data-to="Metrics-retry" data-kind="flow"
        x1="470" y1="440" x2="320" y2="437"
        stroke="#5e35b1" stroke-width="2" marker-end="url(#arr-flow)"/>
  <line data-from="IRetryPolicy" data-to="INotifier-fail" data-kind="flow"
        x1="815" y1="370" x2="815" y2="420"
        stroke="#b71c1c" stroke-width="2" marker-end="url(#arr-retry)"/>
  <line data-from="IRetryPolicy" data-to="Metrics-fail" data-kind="flow"
        x1="815" y1="370" x2="1010" y2="420"
        stroke="#b71c1c" stroke-width="2" marker-end="url(#arr-retry)"/>
</g>

  <rect x="50" y="500" width="16" height="16" fill="#0d47a1" rx="3"/>
  <text x="75" y="515" font-family="sans-serif" font-size="11">正常流转 (submit → execute → succeed → notify)</text>
  <rect x="280" y="500" width="16" height="16" fill="#e65100" rx="3"/>
  <text x="305" y="515" font-family="sans-serif" font-size="11">重试路径 (fail → retry policy → requeue → retry loop)</text>
  <rect x="590" y="500" width="16" height="16" fill="#b71c1c" rx="3"/>
  <text x="615" y="515" font-family="sans-serif" font-size="11">终态失败 (fail → cap exceeded → task.failed)</text>
</svg>
