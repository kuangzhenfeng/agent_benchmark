    <text x="622" y="550" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">Priority</text>
    <text x="622" y="564" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">enum class</text>
  </g>
  <g data-id="EngineConfig" data-kind="class">
