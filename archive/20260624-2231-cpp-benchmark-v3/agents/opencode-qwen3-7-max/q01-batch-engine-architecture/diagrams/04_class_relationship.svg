  <rect x="0" y="0" width="1200" height="800" fill="#f8f9fa"/>
  <text x="600" y="38" font-family="sans-serif" font-size="21" font-weight="bold" text-anchor="middle" fill="#1a1a2e">TaskForge 类与接口关系图 (Class / Interface)</text>
