    <text x="767" y="550" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">EngineConfig</text>
    <text x="767" y="564" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">struct</text>
  </g>
  <g data-id="MetricsCollector" data-kind="class">
