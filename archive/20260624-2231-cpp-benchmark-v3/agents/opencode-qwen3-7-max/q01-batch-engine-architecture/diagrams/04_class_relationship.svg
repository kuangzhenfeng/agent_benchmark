    <text x="990" y="550" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">MetricsCollector</text>
    <text x="990" y="564" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">(concrete, 非接口)</text>
  </g>
  </g>
