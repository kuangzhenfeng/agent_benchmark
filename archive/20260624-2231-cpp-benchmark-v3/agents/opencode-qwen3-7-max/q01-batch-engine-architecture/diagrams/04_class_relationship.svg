  <g data-id="ITaskStore" data-kind="interface">
    <rect x="70" y="80" width="225" height="55" rx="6" fill="#f9a825" filter="url(#shadow)"/>
    <text x="182" y="107" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">ITaskStore  &lt;&lt;interface&gt;&gt;</text>
  </g>
  <g data-id="IRetryPolicy" data-kind="interface">
    <rect x="340" y="80" width="230" height="55" rx="6" fill="#f9a825" filter="url(#shadow)"/>
    <text x="455" y="107" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">IRetryPolicy  &lt;&lt;interface&gt;&gt;</text>
  </g>
  <g data-id="INotifier" data-kind="interface">
    <rect x="615" y="80" width="225" height="55" rx="6" fill="#f9a825" filter="url(#shadow)"/>
    <text x="727" y="107" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">INotifier  &lt;&lt;interface&gt;&gt;</text>
