    <text x="182" y="229" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">(装配)</text>
  </g>
  <g data-id="PersistentTS" data-kind="class">
    <rect x="70" y="270" width="225" height="55" rx="6" fill="#9e9e9e" filter="url(#shadow)"/>
    <text x="182" y="290" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">PersistentTaskStore</text>
    <text x="182" y="304" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">(编译进, 未装配)</text>
  </g>
  <g data-id="ExpoBackoff" data-kind="class">
