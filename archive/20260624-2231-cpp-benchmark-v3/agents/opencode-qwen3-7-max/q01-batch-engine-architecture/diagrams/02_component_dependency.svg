<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800"
     data-style="component">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
    <marker id="arr-depends" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
    <marker id="arr-callback" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#e91e63"/>
    </marker>
    <marker id="arr-flow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0d47a1"/>
    </marker>
    <marker id="arr-retry" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#e65100"/>
    </marker>
    <marker id="arr-impl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0d47a1"/>
    </marker>
    <marker id="arr-uses" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#888"/>
    </marker>
    <marker id="arr-aggr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#e65100"/>
    </marker>
    <marker id="arr-comp" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2e7d32"/>
    </marker>
    <marker id="arr-conn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#444"/>
    </marker>
    <marker id="arr-cont" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1565c0"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="800" fill="#f8f9fa"/>
  <text x="600" y="38" font-family="sans-serif" font-size="21" font-weight="bold" text-anchor="middle" fill="#1a1a2e">TaskForge 组件依赖图 (Compile-time vs Runtime)</text>
  <g data-role="nodes">
  <g data-id="main" data-kind="module">
    <rect x="470" y="80" width="240" height="55" rx="6" fill="#1565c0" filter="url(#shadow)"/>
    <text x="590" y="100" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">main.cpp</text>
    <text x="590" y="114" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">(Composition Root)</text>
  </g>
  <g data-id="Scheduler" data-kind="module">
    <rect x="80" y="180" width="300" height="60" rx="6" fill="#2e7d32" filter="url(#shadow)"/>
    <text x="230" y="210" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">scheduler.hpp / .cpp</text>
  </g>
  <g data-id="WorkerPool" data-kind="module">
    <rect x="420" y="180" width="250" height="60" rx="6" fill="#388e3c" filter="url(#shadow)"/>
    <text x="545" y="203" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">worker.hpp / .cpp</text>
    <text x="545" y="217" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">(WorkerPool + Worker)</text>
  </g>
  <g data-id="Notifier-module" data-kind="module">
    <rect x="710" y="180" width="230" height="60" rx="6" fill="#e65100" filter="url(#shadow)"/>
    <text x="825" y="203" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">notifier.hpp / .cpp</text>
    <text x="825" y="217" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">(Console+Callback+Composite)</text>
  </g>
  <g data-id="TaskStore-module" data-kind="module">
    <rect x="80" y="295" width="210" height="55" rx="6" fill="#f57f17" filter="url(#shadow)"/>
    <text x="185" y="315" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">task_store.hpp/.cpp</text>
    <text x="185" y="329" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">(ITaskStore + impls)</text>
  </g>
  <g data-id="TaskQueue-module" data-kind="module">
    <rect x="320" y="295" width="220" height="55" rx="6" fill="#f9a825" filter="url(#shadow)"/>
    <text x="430" y="315" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">task_queue.hpp/.cpp</text>
    <text x="430" y="329" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">(TaskQueue + Legacy)</text>
  </g>
  <g data-id="RetryPolicy-module" data-kind="module">
    <rect x="570" y="295" width="210" height="55" rx="6" fill="#7b1fa2" filter="url(#shadow)"/>
    <text x="675" y="315" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">retry_policy.hpp/.cpp</text>
    <text x="675" y="329" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">(Fixed + Exponential)</text>
  </g>
  <g data-id="Metrics-module" data-kind="module">
    <rect x="810" y="295" width="170" height="55" rx="6" fill="#5e35b1" filter="url(#shadow)"/>
    <text x="895" y="315" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">metrics.hpp/.cpp</text>
    <text x="895" y="329" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">MetricsCollector</text>
  </g>
  <g data-id="Task-module" data-kind="module">
    <rect x="80" y="410" width="155" height="50" rx="6" fill="#ff8f00" filter="url(#shadow)"/>
    <text x="157" y="435" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">task.hpp / .cpp</text>
  </g>
  <g data-id="Clock-module" data-kind="module">
    <rect x="265" y="410" width="155" height="50" rx="6" fill="#00838f" filter="url(#shadow)"/>
    <text x="342" y="435" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">clock.hpp</text>
  </g>
  <g data-id="Config-module" data-kind="module">
    <rect x="450" y="410" width="155" height="50" rx="6" fill="#00695c" filter="url(#shadow)"/>
    <text x="527" y="435" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">config.hpp / .cpp</text>
  </g>
  <g data-id="Logger-module" data-kind="module">
    <rect x="640" y="410" width="155" height="50" rx="6" fill="#9e9e9e" filter="url(#shadow)"/>
    <text x="717" y="435" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">logger.hpp</text>
  </g>
  <g data-id="TaskQueueLegacy-note" data-kind="module">
    <rect x="320" y="490" width="220" height="50" rx="6" fill="#bdbdbd" filter="url(#shadow)"/>
    <text x="430" y="508" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">TaskQueueLegacy</text>
    <text x="430" y="522" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">(全仓库无人调用,死代码)</text>
  </g>
  <g data-id="ILogger-note" data-kind="module">
    <rect x="640" y="490" width="155" height="50" rx="6" fill="#bdbdbd" filter="url(#shadow)"/>
    <text x="717" y="508" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">ILogger</text>
    <text x="717" y="522" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">(未注入 Scheduler)</text>
  </g>
  </g>
  <g data-role="edges">
  <line data-from="main" data-to="Scheduler" data-kind="depends"
        x1="590" y1="135" x2="230" y2="180"
        stroke="#1565c0" stroke-width="2" marker-end="url(#arr-depends)"/>
  <line data-from="main" data-to="WorkerPool" data-kind="depends"
        x1="590" y1="135" x2="545" y2="180"
        stroke="#1565c0" stroke-width="2" marker-end="url(#arr-depends)"/>
  <line data-from="main" data-to="Notifier-module" data-kind="depends"
        x1="590" y1="135" x2="825" y2="180"
        stroke="#1565c0" stroke-width="2" marker-end="url(#arr-depends)"/>
  <line data-from="Scheduler" data-to="TaskStore-module" data-kind="depends"
        x1="180" y1="240" x2="185" y2="295"
        stroke="#2e7d32" stroke-width="2" marker-end="url(#arr-depends)"/>
  <line data-from="Scheduler" data-to="TaskQueue-module" data-kind="depends"
        x1="230" y1="240" x2="430" y2="295"
        stroke="#2e7d32" stroke-width="2" marker-end="url(#arr-depends)"/>
  <line data-from="Scheduler" data-to="RetryPolicy-module" data-kind="depends"
        x1="280" y1="240" x2="675" y2="295"
        stroke="#2e7d32" stroke-width="2" marker-end="url(#arr-depends)"/>
  <line data-from="Scheduler" data-to="Metrics-module" data-kind="depends"
        x1="340" y1="240" x2="895" y2="295"
        stroke="#2e7d32" stroke-width="2" marker-end="url(#arr-depends)"/>
  <line data-from="Scheduler" data-to="Task-module" data-kind="depends"
        x1="200" y1="240" x2="157" y2="410"
        stroke="#2e7d32" stroke-width="2" marker-end="url(#arr-depends)"/>
  <line data-from="Scheduler" data-to="Clock-module" data-kind="depends"
        x1="300" y1="240" x2="342" y2="410"
        stroke="#2e7d32" stroke-width="2" marker-end="url(#arr-depends)"/>
  <line data-from="Scheduler" data-to="Config-module" data-kind="depends"
        x1="370" y1="240" x2="527" y2="410"
        stroke="#2e7d32" stroke-width="2" marker-end="url(#arr-depends)"/>
  <line data-from="Scheduler" data-to="WorkerPool" data-kind="depends"
        x1="380" y1="210" x2="420" y2="210"
        stroke="#2e7d32" stroke-width="2" marker-end="url(#arr-depends)"/>
  <line data-from="WorkerPool" data-to="TaskQueue-module" data-kind="depends"
        x1="545" y1="240" x2="430" y2="295"
        stroke="#388e3c" stroke-width="2" marker-end="url(#arr-depends)"/>
  <line data-from="WorkerPool" data-to="Task-module" data-kind="depends"
        x1="500" y1="240" x2="175" y2="410"
        stroke="#388e3c" stroke-width="2" marker-end="url(#arr-depends)"/>
  <line data-from="WorkerPool" data-to="Scheduler" data-kind="callback"
        x1="545" y1="200" x2="380" y2="200"
        stroke="#e91e63" stroke-width="2" marker-end="url(#arr-callback)" stroke-dasharray="6,3"/>
  <line data-from="Notifier-module" data-to="Task-module" data-kind="depends"
        x1="825" y1="240" x2="175" y2="410"
        stroke="#e65100" stroke-width="2" marker-end="url(#arr-depends)"/>
  <line data-from="TaskStore-module" data-to="Task-module" data-kind="depends"
        x1="185" y1="350" x2="175" y2="410"
        stroke="#f57f17" stroke-width="2" marker-end="url(#arr-depends)"/>
  <line data-from="TaskQueue-module" data-to="Task-module" data-kind="depends"
        x1="430" y1="350" x2="175" y2="410"
        stroke="#f9a825" stroke-width="2" marker-end="url(#arr-depends)"/>
</g>

  <rect x="50" y="540" width="60" height="20" fill="#2e7d32" rx="3"/>
  <text x="120" y="555" font-family="sans-serif" font-size="12" fill="#333">实线 = 编译期 #include 依赖</text>
  <rect x="50" y="565" width="60" height="20" fill="#e91e63" rx="3"/>
  <line x1="50" y1="575" x2="110" y2="575" stroke="#e91e63" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="120" y="580" font-family="sans-serif" font-size="12" fill="#333">虚线 = 运行时回调 (std::function, NOT 编译期依赖)</text>
</svg>
