<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800" data-style="class">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#274255"/>
    </marker>
    <style>
      .title { font: 700 30px 'Trebuchet MS', 'DejaVu Sans', sans-serif; fill: #17384c; }
      .subtitle { font: 400 14px 'Trebuchet MS', 'DejaVu Sans', sans-serif; fill: #4b5f6a; }
      .name { font: 700 14px 'Trebuchet MS', 'DejaVu Sans', sans-serif; fill: #17384c; text-anchor: middle; }
      .meta { font: 12px 'Trebuchet MS', 'DejaVu Sans', sans-serif; fill: #5c6b78; text-anchor: middle; }
      .edge { stroke: #274255; stroke-width: 2.1; fill: none; marker-end: url(#arrow); }
      .box { rx: 14; ry: 14; stroke-width: 2; }
      .iface { fill: #eef7ff; stroke: #7aa8c7; }
      .impl { fill: #ffffff; stroke: #48779b; }
      .root { fill: #fff7eb; stroke: #d39a4b; }
      .orchestrator { fill: #ffffff; stroke: #2d6f94; }
      .legend { font: 12px 'Trebuchet MS', 'DejaVu Sans', sans-serif; fill: #51636f; }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="800" fill="#f7fbff"/>
  <text class="title" x="60" y="60">TaskForge Class Relationship View</text>
  <text class="subtitle" x="60" y="88">Interfaces stay on the left; the composition root wires concrete implementations on the right.</text>

  <g data-role="edges">
    <line class="edge" x1="330" y1="162" x2="245" y2="162" data-from="InMemoryTaskStore" data-to="ITaskStore" data-kind="implements"/>
    <line class="edge" x1="330" y1="242" x2="245" y2="162" data-from="PersistentTaskStore" data-to="ITaskStore" data-kind="implements"/>
    <line class="edge" x1="330" y1="322" x2="245" y2="322" data-from="ExponentialBackoffPolicy" data-to="IRetryPolicy" data-kind="implements"/>
    <line class="edge" x1="330" y1="402" x2="245" y2="322" data-from="FixedBackoffPolicy" data-to="IRetryPolicy" data-kind="implements"/>
    <line class="edge" x1="330" y1="482" x2="245" y2="482" data-from="CompositeNotifier" data-to="INotifier" data-kind="implements"/>
    <line class="edge" x1="330" y1="562" x2="245" y2="482" data-from="ConsoleNotifier" data-to="INotifier" data-kind="implements"/>
    <line class="edge" x1="330" y1="642" x2="245" y2="482" data-from="CallbackNotifier" data-to="INotifier" data-kind="implements"/>
    <line class="edge" x1="330" y1="722" x2="245" y2="682" data-from="SystemClock" data-to="IClock" data-kind="implements"/>
    <line class="edge" x1="760" y1="294" x2="245" y2="162" data-from="Scheduler" data-to="ITaskStore" data-kind="aggregates"/>
    <line class="edge" x1="760" y1="312" x2="245" y2="322" data-from="Scheduler" data-to="IRetryPolicy" data-kind="aggregates"/>
    <line class="edge" x1="760" y1="330" x2="245" y2="482" data-from="Scheduler" data-to="INotifier" data-kind="aggregates"/>
    <line class="edge" x1="760" y1="348" x2="245" y2="682" data-from="Scheduler" data-to="IClock" data-kind="uses"/>
    <line class="edge" x1="810" y1="386" x2="760" y2="516" data-from="Scheduler" data-to="MetricsCollector" data-kind="aggregates"/>
    <line class="edge" x1="880" y1="354" x2="970" y2="300" data-from="Scheduler" data-to="WorkerPool" data-kind="composes"/>
    <line class="edge" x1="870" y1="372" x2="970" y2="520" data-from="Scheduler" data-to="TaskQueue" data-kind="composes"/>
    <line class="edge" x1="1040" y1="324" x2="1040" y2="418" data-from="WorkerPool" data-to="Worker" data-kind="composes"/>
    <line class="edge" x1="1040" y1="458" x2="1040" y2="520" data-from="Worker" data-to="TaskQueue" data-kind="uses"/>
    <line class="edge" x1="500" y1="498" x2="245" y2="482" data-from="CompositeNotifier" data-to="INotifier" data-kind="aggregates"/>
    <line class="edge" x1="980" y1="120" x2="860" y2="294" data-from="main" data-to="Scheduler" data-kind="composes"/>
    <line class="edge" x1="980" y1="120" x2="420" y2="162" data-from="main" data-to="InMemoryTaskStore" data-kind="composes"/>
    <line class="edge" x1="980" y1="120" x2="420" y2="322" data-from="main" data-to="ExponentialBackoffPolicy" data-kind="composes"/>
    <line class="edge" x1="980" y1="120" x2="510" y2="482" data-from="main" data-to="CompositeNotifier" data-kind="composes"/>
    <line class="edge" x1="980" y1="120" x2="420" y2="722" data-from="main" data-to="SystemClock" data-kind="composes"/>
    <line class="edge" x1="980" y1="120" x2="760" y2="516" data-from="main" data-to="MetricsCollector" data-kind="composes"/>
    <line class="edge" x1="980" y1="120" x2="760" y2="676" data-from="main" data-to="EngineConfig" data-kind="composes"/>
  </g>

  <g data-role="nodes">
    <g data-id="ITaskStore" data-kind="interface">
      <rect class="box iface" x="70" y="130" width="175" height="64"/>
      <text class="name" x="157.5" y="156">ITaskStore</text>
      <text class="meta" x="157.5" y="178">save / load / remove</text>
    </g>
    <g data-id="IRetryPolicy" data-kind="interface">
      <rect class="box iface" x="70" y="290" width="175" height="64"/>
      <text class="name" x="157.5" y="316">IRetryPolicy</text>
      <text class="meta" x="157.5" y="338">next_delay_ms()</text>
    </g>
    <g data-id="INotifier" data-kind="interface">
      <rect class="box iface" x="70" y="450" width="175" height="64"/>
      <text class="name" x="157.5" y="476">INotifier</text>
      <text class="meta" x="157.5" y="498">on_event()</text>
    </g>
    <g data-id="IClock" data-kind="interface">
      <rect class="box iface" x="70" y="650" width="175" height="64"/>
      <text class="name" x="157.5" y="676">IClock</text>
      <text class="meta" x="157.5" y="698">now_ms()</text>
    </g>

    <g data-id="InMemoryTaskStore" data-kind="class">
      <rect class="box impl" x="330" y="130" width="190" height="64"/>
      <text class="name" x="425" y="156">InMemoryTaskStore</text>
      <text class="meta" x="425" y="178">default implementation</text>
    </g>
    <g data-id="PersistentTaskStore" data-kind="class">
      <rect class="box impl" x="330" y="210" width="190" height="64"/>
      <text class="name" x="425" y="236">PersistentTaskStore</text>
      <text class="meta" x="425" y="258">compiled, not wired in demo</text>
    </g>
    <g data-id="ExponentialBackoffPolicy" data-kind="class">
      <rect class="box impl" x="330" y="290" width="210" height="64"/>
      <text class="name" x="435" y="316">ExponentialBackoffPolicy</text>
      <text class="meta" x="435" y="338">used by main()</text>
    </g>
    <g data-id="FixedBackoffPolicy" data-kind="class">
      <rect class="box impl" x="330" y="370" width="190" height="64"/>
      <text class="name" x="425" y="396">FixedBackoffPolicy</text>
      <text class="meta" x="425" y="418">available but inactive</text>
    </g>
    <g data-id="CompositeNotifier" data-kind="class">
      <rect class="box impl" x="330" y="450" width="200" height="64"/>
      <text class="name" x="430" y="476">CompositeNotifier</text>
      <text class="meta" x="430" y="498">vector&lt;shared_ptr&lt;INotifier&gt;&gt;</text>
    </g>
    <g data-id="ConsoleNotifier" data-kind="class">
      <rect class="box impl" x="330" y="530" width="190" height="64"/>
      <text class="name" x="425" y="556">ConsoleNotifier</text>
      <text class="meta" x="425" y="578">stdout adapter</text>
    </g>
    <g data-id="CallbackNotifier" data-kind="class">
      <rect class="box impl" x="330" y="610" width="190" height="64"/>
      <text class="name" x="425" y="636">CallbackNotifier</text>
      <text class="meta" x="425" y="658">user lambda adapter</text>
    </g>
    <g data-id="SystemClock" data-kind="class">
      <rect class="box impl" x="330" y="690" width="190" height="64"/>
      <text class="name" x="425" y="716">SystemClock</text>
      <text class="meta" x="425" y="738">steady_clock wrapper</text>
    </g>

    <g data-id="Scheduler" data-kind="class">
      <rect class="box orchestrator" x="760" y="260" width="170" height="140"/>
      <text class="name" x="845" y="294">Scheduler</text>
      <text class="meta" x="845" y="320">aggregates abstractions</text>
      <text class="meta" x="845" y="342">composes queue + pool</text>
      <text class="meta" x="845" y="364">submit / run / stop</text>
    </g>
    <g data-id="MetricsCollector" data-kind="class">
      <rect class="box impl" x="670" y="484" width="180" height="64"/>
      <text class="name" x="760" y="510">MetricsCollector</text>
      <text class="meta" x="760" y="532">shared counters</text>
    </g>
    <g data-id="EngineConfig" data-kind="struct">
      <rect class="box impl" x="670" y="644" width="180" height="64"/>
      <text class="name" x="760" y="670">EngineConfig</text>
      <text class="meta" x="760" y="692">worker_count / attempts</text>
    </g>
    <g data-id="WorkerPool" data-kind="class">
      <rect class="box impl" x="970" y="260" width="140" height="64"/>
      <text class="name" x="1040" y="286">WorkerPool</text>
      <text class="meta" x="1040" y="308">owns N workers</text>
    </g>
    <g data-id="Worker" data-kind="class">
      <rect class="box impl" x="970" y="418" width="140" height="64"/>
      <text class="name" x="1040" y="444">Worker</text>
      <text class="meta" x="1040" y="466">thread + callback</text>
    </g>
    <g data-id="TaskQueue" data-kind="class">
      <rect class="box impl" x="970" y="488" width="140" height="64"/>
      <text class="name" x="1040" y="514">TaskQueue</text>
      <text class="meta" x="1040" y="536">priority_queue</text>
    </g>
    <g data-id="main" data-kind="function">
      <rect class="box root" x="910" y="88" width="150" height="64"/>
      <text class="name" x="985" y="114">main()</text>
      <text class="meta" x="985" y="136">composition root</text>
    </g>
  </g>

  <text class="legend" x="60" y="770">Edge kinds: implements = inheritance to interface, aggregates = injected dependency, composes = direct owned member, uses = reference-only usage.</text>
</svg>
