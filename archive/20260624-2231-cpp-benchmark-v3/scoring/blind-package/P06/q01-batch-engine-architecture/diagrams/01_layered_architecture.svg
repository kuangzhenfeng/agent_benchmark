<?xml version="1.0" encoding="UTF-8"?>
<!-- TaskForge 分层架构图：按真实编译期依赖方向分层（应用入口 / 编排 / 领域服务 / 基础设施）。
     注意：MetricsCollector 注释自称"核心调度组件"，但它是无内部依赖的原子计数叶子，按依赖方向归入基础设施层。 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" width="1200" height="820"
     data-style="layered" data-title="TaskForge Layered Architecture">
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3a3a3a"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="820" fill="#fbfbfd"/>

  <!-- 标题 -->
  <text x="600" y="40" font-family="sans-serif" font-size="24" font-weight="700" text-anchor="middle" fill="#1a1a2e">TaskForge — 分层架构（按编译期依赖方向）</text>
  <text x="600" y="62" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#6b7280">依赖自上而下流动；下层不感知上层</text>

  <!-- ===== 分层背景带 ===== -->
  <rect x="30"  y="85"  width="1140" height="120" rx="10" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="55"  y="108" font-family="sans-serif" font-size="14" font-weight="700" fill="#3730a3">L3 · 应用入口（Composition Root）</text>

  <rect x="30"  y="225" width="1140" height="120" rx="10" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="55"  y="248" font-family="sans-serif" font-size="14" font-weight="700" fill="#065f46">L2 · 编排层（Orchestration）</text>

  <rect x="30"  y="365" width="1140" height="220" rx="10" fill="#fffbeb" stroke="#fde68a"/>
  <text x="55"  y="388" font-family="sans-serif" font-size="14" font-weight="700" fill="#92400e">L1 · 领域服务层（Domain Services）</text>

  <rect x="30"  y="605" width="1140" height="180" rx="10" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="55"  y="628" font-family="sans-serif" font-size="14" font-weight="700" fill="#334155">L0 · 基础设施层（Infrastructure / 叶子工具）</text>

  <!-- ===== 节点 ===== -->
  <g data-role="nodes">
    <!-- L3 -->
    <g data-id="main" data-kind="class">
      <rect x="470" y="120" width="260" height="70" rx="8" fill="#ffffff" stroke="#4f46e5" stroke-width="2"/>
      <text x="600" y="148" font-family="sans-serif" font-size="16" font-weight="700" text-anchor="middle" fill="#1e1b4b">main</text>
      <text x="600" y="170" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#4338ca">组合根：装配所有具体实现</text>
    </g>

    <!-- L2 -->
    <g data-id="Scheduler" data-kind="class">
      <rect x="490" y="260" width="220" height="70" rx="8" fill="#ffffff" stroke="#059669" stroke-width="2"/>
      <text x="600" y="288" font-family="sans-serif" font-size="16" font-weight="700" text-anchor="middle" fill="#064e3b">Scheduler</text>
      <text x="600" y="310" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#047857">编排核心：submit / run / handle_completion</text>
    </g>

    <!-- L1 领域服务 -->
    <g data-id="WorkerPool" data-kind="class">
      <rect x="70" y="410" width="180" height="64" rx="8" fill="#ffffff" stroke="#d97706"/>
      <text x="160" y="436" font-family="sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#78350f">WorkerPool</text>
      <text x="160" y="457" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#92400e">持有 N 个 Worker</text>
    </g>
    <g data-id="Worker" data-kind="class">
      <rect x="70" y="500" width="180" height="64" rx="8" fill="#ffffff" stroke="#d97706"/>
      <text x="160" y="526" font-family="sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#78350f">Worker</text>
      <text x="160" y="547" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#92400e">单线程执行单元</text>
    </g>
    <g data-id="TaskQueue" data-kind="class">
      <rect x="280" y="410" width="180" height="64" rx="8" fill="#ffffff" stroke="#d97706"/>
      <text x="370" y="436" font-family="sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#78350f">TaskQueue</text>
      <text x="370" y="457" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#92400e">优先级队列（在用）</text>
    </g>
    <g data-id="Task" data-kind="class">
      <rect x="280" y="500" width="180" height="64" rx="8" fill="#ffffff" stroke="#d97706"/>
      <text x="370" y="526" font-family="sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#78350f">Task / TaskResult</text>
      <text x="370" y="547" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#92400e">领域实体</text>
    </g>
    <g data-id="ITaskStore" data-kind="class">
      <rect x="490" y="410" width="200" height="64" rx="8" fill="#ffffff" stroke="#d97706"/>
      <text x="590" y="436" font-family="sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#78350f">ITaskStore</text>
      <text x="590" y="457" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#92400e">状态存储抽象</text>
    </g>
    <g data-id="INotifier" data-kind="class">
      <rect x="720" y="410" width="190" height="64" rx="8" fill="#ffffff" stroke="#d97706"/>
      <text x="815" y="436" font-family="sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#78350f">INotifier</text>
      <text x="815" y="457" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#92400e">事件通知抽象</text>
    </g>
    <g data-id="IRetryPolicy" data-kind="class">
      <rect x="940" y="410" width="210" height="64" rx="8" fill="#ffffff" stroke="#d97706"/>
      <text x="1045" y="436" font-family="sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#78350f">IRetryPolicy</text>
      <text x="1045" y="457" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#92400e">重试退避抽象</text>
    </g>

    <!-- L0 基础设施 -->
    <g data-id="MetricsCollector" data-kind="class">
      <rect x="70" y="650" width="210" height="64" rx="8" fill="#ffffff" stroke="#64748b" stroke-dasharray="4 3"/>
      <text x="175" y="676" font-family="sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#334155">MetricsCollector</text>
      <text x="175" y="697" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#64748b">原子计数器（注释自称"核心"，实为叶子）</text>
    </g>
    <g data-id="IClock" data-kind="class">
      <rect x="300" y="650" width="200" height="64" rx="8" fill="#ffffff" stroke="#64748b"/>
      <text x="400" y="676" font-family="sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#334155">IClock / SystemClock</text>
      <text x="400" y="697" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#64748b">时钟抽象 / 系统实现</text>
    </g>
    <g data-id="EngineConfig" data-kind="class">
      <rect x="520" y="650" width="220" height="64" rx="8" fill="#ffffff" stroke="#64748b"/>
      <text x="630" y="676" font-family="sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#334155">EngineConfig / ConfigLoader</text>
      <text x="630" y="697" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#64748b">配置结构 + 档位加载</text>
    </g>
    <g data-id="ILogger" data-kind="class">
      <rect x="760" y="650" width="210" height="64" rx="8" fill="#ffffff" stroke="#64748b" stroke-dasharray="4 3"/>
      <text x="865" y="676" font-family="sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#334155">ILogger / ConsoleLogger</text>
      <text x="865" y="697" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#64748b">日志抽象（编译进产物，运行时未用）</text>
    </g>
    <g data-id="TaskStatus" data-kind="class">
      <rect x="990" y="650" width="160" height="64" rx="8" fill="#ffffff" stroke="#64748b"/>
      <text x="1070" y="676" font-family="sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#334155">TaskStatus</text>
      <text x="1070" y="697" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#64748b">状态机枚举</text>
    </g>
  </g>

  <!-- ===== 边 ===== -->
  <g data-role="edges" stroke="#3a3a3a" stroke-width="1.6" fill="none" marker-end="url(#arrow)">
    <!-- main → Scheduler -->
    <line data-from="main" data-to="Scheduler" data-kind="depends" x1="600" y1="190" x2="600" y2="258"/>
    <!-- main → EngineConfig(ConfigLoader) -->
    <line data-from="main" data-to="EngineConfig" data-kind="depends" x1="510" y1="190" x2="560" y2="648"/>
    <!-- main → ILogger(编译期 include，但运行时未实例化) -->
    <line data-from="main" data-to="ILogger" data-kind="depends" x1="690" y1="190" x2="820" y2="648" stroke-dasharray="5 4"/>

    <!-- Scheduler → 领域服务 -->
    <line data-from="Scheduler" data-to="WorkerPool" data-kind="depends" x1="500" y1="320" x2="180" y2="408"/>
    <line data-from="Scheduler" data-to="TaskQueue" data-kind="depends" x1="540" y1="330" x2="390" y2="408"/>
    <line data-from="Scheduler" data-to="ITaskStore" data-kind="depends" x1="590" y1="330" x2="590" y2="408"/>
    <line data-from="Scheduler" data-to="INotifier" data-kind="depends" x1="660" y1="330" x2="800" y2="408"/>
    <line data-from="Scheduler" data-to="IRetryPolicy" data-kind="depends" x1="700" y1="320" x2="1020" y2="408"/>

    <!-- Scheduler → 基础设施（跨层叶子依赖） -->
    <line data-from="Scheduler" data-to="MetricsCollector" data-kind="depends" x1="540" y1="330" x2="190" y2="648"/>
    <line data-from="Scheduler" data-to="IClock" data-kind="depends" x1="600" y1="330" x2="410" y2="648"/>
    <line data-from="Scheduler" data-to="EngineConfig" data-kind="depends" x1="640" y1="330" x2="630" y2="648"/>

    <!-- 领域层内部 -->
    <line data-from="WorkerPool" data-to="Worker" data-kind="depends" x1="160" y1="474" x2="160" y2="498"/>
    <line data-from="Worker" data-to="TaskQueue" data-kind="depends" x1="250" y1="525" x2="280" y2="450"/>
    <line data-from="Worker" data-to="Task" data-kind="depends" x1="250" y1="540" x2="280" y2="525"/>
    <line data-from="TaskQueue" data-to="Task" data-kind="depends" x1="370" y1="474" x2="370" y2="498"/>
    <line data-from="ITaskStore" data-to="Task" data-kind="depends" x1="500" y1="470" x2="430" y2="510"/>
    <line data-from="INotifier" data-to="Task" data-kind="depends" x1="720" y1="470" x2="450" y2="515"/>
  </g>

  <!-- 图例 -->
  <g font-family="sans-serif" font-size="12" fill="#374151">
    <rect x="1010" y="100" width="150" height="70" rx="6" fill="#ffffff" stroke="#d1d5db"/>
    <text x="1020" y="120" font-weight="700">图例</text>
    <line x1="1022" y1="138" x2="1052" y2="138" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#arrow)"/>
    <text x="1060" y="142">depends（实线）</text>
    <line x1="1022" y1="158" x2="1052" y2="158" stroke="#3a3a3a" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
    <text x="1060" y="162">含运行时未实例化</text>
  </g>
</svg>
