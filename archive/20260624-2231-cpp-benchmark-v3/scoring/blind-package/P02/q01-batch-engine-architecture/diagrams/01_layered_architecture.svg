<?xml version="1.0" encoding="UTF-8"?>
<!-- TaskForge 的编译期依赖分层；箭头由依赖者指向被依赖者。 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" width="1500" height="1000" data-style="layered">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#50657a"/></marker>
    <style>
      .title { font: 700 30px sans-serif; fill: #152235; } .subtitle { font: 15px sans-serif; fill: #5a6b7d; }
      .layer { stroke-width: 2; rx: 18; } .layer-label { font: 700 18px sans-serif; letter-spacing: 1px; }
      .node rect { rx: 10; stroke-width: 1.5; } .node text { font: 600 16px sans-serif; fill: #17283a; text-anchor: middle; }
      .small { font: 13px sans-serif !important; fill: #536577 !important; font-weight: 400 !important; }
      .edge { fill: none; stroke: #50657a; stroke-width: 2; marker-end: url(#arrow); opacity: .9; }
      .caption { font: 14px sans-serif; fill: #536577; }
    </style>
  </defs>
  <rect width="1500" height="1000" fill="#f7fafc"/>
  <text x="70" y="62" class="title">TaskForge 分层架构</text>
  <text x="70" y="91" class="subtitle">箭头表示编译期依赖方向；层次按实际 include / 类型依赖，而非源码注释的自称划分。</text>

  <rect x="55" y="125" width="1390" height="145" fill="#e8f1ff" stroke="#80a9de" class="layer"/>
  <text x="82" y="158" fill="#245382" class="layer-label">应用与组合根</text>
  <rect x="55" y="290" width="1390" height="175" fill="#eef8f1" stroke="#7cbd99" class="layer"/>
  <text x="82" y="323" fill="#246441" class="layer-label">编排层</text>
  <rect x="55" y="485" width="1390" height="195" fill="#fff7e9" stroke="#e4af59" class="layer"/>
  <text x="82" y="518" fill="#8b5a10" class="layer-label">任务执行与领域模型</text>
  <rect x="55" y="700" width="1390" height="235" fill="#f4effc" stroke="#a58ad2" class="layer"/>
  <text x="82" y="733" fill="#624499" class="layer-label">基础设施与可替换策略</text>

  <g data-role="edges">
    <path class="edge" data-from="main" data-to="Scheduler" data-kind="depends" d="M 760 240 L 760 350"/>
    <path class="edge" data-from="main" data-to="ConfigLoader" data-kind="depends" d="M 965 240 L 1120 740"/>
    <path class="edge" data-from="Scheduler" data-to="TaskQueue" data-kind="depends" d="M 660 420 L 535 550"/>
    <path class="edge" data-from="Scheduler" data-to="WorkerPool" data-kind="depends" d="M 800 420 L 800 550"/>
    <path class="edge" data-from="Scheduler" data-to="Task" data-kind="depends" d="M 900 420 L 1050 550"/>
    <path class="edge" data-from="Scheduler" data-to="ITaskStore" data-kind="depends" d="M 600 420 L 280 770"/>
    <path class="edge" data-from="Scheduler" data-to="IRetryPolicy" data-kind="depends" d="M 690 420 L 550 770"/>
    <path class="edge" data-from="Scheduler" data-to="INotifier" data-kind="depends" d="M 830 420 L 810 770"/>
    <path class="edge" data-from="Scheduler" data-to="MetricsCollector" data-kind="depends" d="M 925 420 L 1060 770"/>
    <path class="edge" data-from="Scheduler" data-to="IClock" data-kind="depends" d="M 980 420 L 1270 770"/>
    <path class="edge" data-from="WorkerPool" data-to="TaskQueue" data-kind="depends" d="M 745 620 L 590 620"/>
    <path class="edge" data-from="WorkerPool" data-to="Task" data-kind="depends" d="M 890 620 L 1010 620"/>
    <path class="edge" data-from="TaskQueue" data-to="Task" data-kind="depends" d="M 605 590 L 1000 590"/>
    <path class="edge" data-from="InMemoryTaskStore" data-to="ITaskStore" data-kind="depends" d="M 220 860 L 260 815"/>
    <path class="edge" data-from="ExponentialBackoffPolicy" data-to="IRetryPolicy" data-kind="depends" d="M 485 860 L 535 815"/>
    <path class="edge" data-from="CompositeNotifier" data-to="INotifier" data-kind="depends" d="M 755 860 L 795 815"/>
    <path class="edge" data-from="SystemClock" data-to="IClock" data-kind="depends" d="M 1245 860 L 1275 815"/>
  </g>

  <g data-role="nodes">
    <g data-id="main" data-kind="composition-root" class="node"><rect x="610" y="180" width="300" height="60" fill="#fff" stroke="#4d86c4"/><text x="760" y="207">main · 组合根</text><text x="760" y="228" class="small">装配具体实现并运行 Scheduler</text></g>
    <g data-id="EngineConfig" data-kind="value-object" class="node"><rect x="990" y="180" width="245" height="60" fill="#fff" stroke="#4d86c4"/><text x="1112" y="207">EngineConfig</text><text x="1112" y="228" class="small">线程数与重试参数</text></g>

    <g data-id="Scheduler" data-kind="class" class="node"><rect x="610" y="350" width="300" height="70" fill="#fff" stroke="#4d9b70" stroke-width="2"/><text x="760" y="380">Scheduler</text><text x="760" y="403" class="small">提交、结算、重试与生命周期编排</text></g>

    <g data-id="TaskQueue" data-kind="class" class="node"><rect x="415" y="550" width="190" height="70" fill="#fff" stroke="#cd8b28"/><text x="510" y="580">TaskQueue</text><text x="510" y="603" class="small">线程安全优先级队列</text></g>
    <g data-id="WorkerPool" data-kind="class" class="node"><rect x="705" y="550" width="190" height="70" fill="#fff" stroke="#cd8b28"/><text x="800" y="580">WorkerPool</text><text x="800" y="603" class="small">拥有并启动 Worker</text></g>
    <g data-id="Task" data-kind="domain-model" class="node"><rect x="1000" y="550" width="190" height="70" fill="#fff" stroke="#cd8b28"/><text x="1095" y="580">Task / TaskResult</text><text x="1095" y="603" class="small">任务状态与执行结果</text></g>

    <g data-id="ITaskStore" data-kind="interface" class="node"><rect x="165" y="770" width="190" height="70" fill="#fff" stroke="#8468b5"/><text x="260" y="800">ITaskStore</text><text x="260" y="823" class="small">状态存储契约</text></g>
    <g data-id="IRetryPolicy" data-kind="interface" class="node"><rect x="440" y="770" width="190" height="70" fill="#fff" stroke="#8468b5"/><text x="535" y="800">IRetryPolicy</text><text x="535" y="823" class="small">退避与重试上限</text></g>
    <g data-id="INotifier" data-kind="interface" class="node"><rect x="715" y="770" width="190" height="70" fill="#fff" stroke="#8468b5"/><text x="810" y="800">INotifier</text><text x="810" y="823" class="small">终态事件广播</text></g>
    <g data-id="MetricsCollector" data-kind="class" class="node"><rect x="985" y="770" width="190" height="70" fill="#fff" stroke="#8468b5"/><text x="1080" y="800">MetricsCollector</text><text x="1080" y="823" class="small">原子计数器；基础设施叶子</text></g>
    <g data-id="IClock" data-kind="interface" class="node"><rect x="1205" y="770" width="190" height="70" fill="#fff" stroke="#8468b5"/><text x="1300" y="800">IClock</text><text x="1300" y="823" class="small">时间抽象</text></g>

    <g data-id="InMemoryTaskStore" data-kind="implementation" class="node"><rect x="125" y="860" width="190" height="50" fill="#fbf9ff" stroke="#a58ad2" stroke-dasharray="5 4"/><text x="220" y="891">InMemoryTaskStore</text></g>
    <g data-id="ExponentialBackoffPolicy" data-kind="implementation" class="node"><rect x="380" y="860" width="230" height="50" fill="#fbf9ff" stroke="#a58ad2" stroke-dasharray="5 4"/><text x="495" y="891">ExponentialBackoffPolicy</text></g>
    <g data-id="CompositeNotifier" data-kind="implementation" class="node"><rect x="670" y="860" width="190" height="50" fill="#fbf9ff" stroke="#a58ad2" stroke-dasharray="5 4"/><text x="765" y="891">CompositeNotifier</text></g>
    <g data-id="SystemClock" data-kind="implementation" class="node"><rect x="1195" y="860" width="160" height="50" fill="#fbf9ff" stroke="#a58ad2" stroke-dasharray="5 4"/><text x="1275" y="891">SystemClock</text></g>
    <g data-id="ConfigLoader" data-kind="class" class="node"><rect x="1050" y="860" width="130" height="50" fill="#fbf9ff" stroke="#a58ad2" stroke-dasharray="5 4"/><text x="1115" y="891">ConfigLoader</text></g>
  </g>
  <text x="70" y="970" class="caption">注：MetricsCollector 的注释称“核心调度组件”，但它没有反向依赖 Scheduler；因此按实际依赖方向位于基础设施叶子，而非编排层。</text>
</svg>
