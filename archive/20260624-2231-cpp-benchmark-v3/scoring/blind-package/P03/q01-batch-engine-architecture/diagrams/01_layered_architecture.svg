<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800"
     data-style="layered">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
    <marker id="arr-depends" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
    <marker id="arr-callback" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#e91e63"/>
    </marker>
    <marker id="arr-flow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0d47a1"/>
    </marker>
    <marker id="arr-retry" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#e65100"/>
    </marker>
    <marker id="arr-impl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0d47a1"/>
    </marker>
    <marker id="arr-uses" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#888"/>
    </marker>
    <marker id="arr-aggr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#e65100"/>
    </marker>
    <marker id="arr-comp" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2e7d32"/>
    </marker>
    <marker id="arr-conn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#444"/>
    </marker>
    <marker id="arr-cont" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1565c0"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="800" fill="#f8f9fa"/>
  <text x="600" y="38" font-family="sans-serif" font-size="21" font-weight="bold" text-anchor="middle" fill="#1a1a2e">TaskForge 分层架构图 (Layered Architecture)</text>
  <rect x="40" y="65" width="1120" height="75" rx="8" fill="#e3f2fd" opacity="0.18"/>  <text x="60" y="85" font-family="sans-serif" font-size="13" fill="#333" font-style="italic">Layer A — Application Entry  (main.cpp)</text>  <rect x="40" y="150" width="1120" height="105" rx="8" fill="#e8f5e9" opacity="0.18"/>  <text x="60" y="170" font-family="sans-serif" font-size="13" fill="#333" font-style="italic">Layer B — Orchestration  (Scheduler, WorkerPool, Worker)</text>  <rect x="40" y="265" width="1120" height="145" rx="8" fill="#fff8e1" opacity="0.18"/>  <text x="60" y="285" font-family="sans-serif" font-size="13" fill="#333" font-style="italic">Layer C — Domain Contracts  (接口 + 领域实体)</text>  <rect x="40" y="420" width="1120" height="260" rx="8" fill="#fce4ec" opacity="0.18"/>  <text x="60" y="440" font-family="sans-serif" font-size="13" fill="#333" font-style="italic">Layer D — Infrastructure  (具体实现 + 支撑组件)</text>  <rect x="40" y="690" width="1120" height="95" rx="8" fill="#f3e5f5" opacity="0.18"/>  <text x="60" y="710" font-family="sans-serif" font-size="13" fill="#333" font-style="italic">Dead Code  (编译进产物但未被核心路径使用)</text>  <g data-role="nodes">
  <g data-id="main" data-kind="component">
    <rect x="500" y="82" width="200" height="40" rx="6" fill="#1565c0" filter="url(#shadow)"/>
    <text x="600" y="102" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">main()  Composition Root</text>
  </g>
  <g data-id="Scheduler" data-kind="class">
    <rect x="120" y="175" width="260" height="60" rx="6" fill="#2e7d32" filter="url(#shadow)"/>
    <text x="250" y="198" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">Scheduler</text>
    <text x="250" y="212" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">(编排核心)</text>
  </g>
  <g data-id="WorkerPool" data-kind="class">
    <rect x="420" y="175" width="220" height="60" rx="6" fill="#388e3c" filter="url(#shadow)"/>
    <text x="530" y="198" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">WorkerPool</text>
    <text x="530" y="212" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">(线程池)</text>
  </g>
  <g data-id="Worker" data-kind="class">
    <rect x="680" y="175" width="180" height="60" rx="6" fill="#43a047" filter="url(#shadow)"/>
    <text x="770" y="198" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">Worker [N=4]</text>
    <text x="770" y="212" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">(std::thread)</text>
  </g>
  <g data-id="ITaskStore" data-kind="interface">
    <rect x="80" y="285" width="175" height="50" rx="6" fill="#f9a825" filter="url(#shadow)"/>
    <text x="167" y="310" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">ITaskStore  &lt;&lt;if&gt;&gt;</text>
  </g>
  <g data-id="IRetryPolicy" data-kind="interface">
    <rect x="280" y="285" width="175" height="50" rx="6" fill="#f9a825" filter="url(#shadow)"/>
    <text x="367" y="310" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">IRetryPolicy  &lt;&lt;if&gt;&gt;</text>
  </g>
  <g data-id="INotifier" data-kind="interface">
    <rect x="480" y="285" width="175" height="50" rx="6" fill="#f9a825" filter="url(#shadow)"/>
    <text x="567" y="310" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">INotifier  &lt;&lt;if&gt;&gt;</text>
  </g>
  <g data-id="IClock" data-kind="interface">
    <rect x="680" y="285" width="155" height="50" rx="6" fill="#f9a825" filter="url(#shadow)"/>
    <text x="757" y="310" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">IClock  &lt;&lt;if&gt;&gt;</text>
  </g>
  <g data-id="Task" data-kind="class">
    <rect x="860" y="285" width="210" height="50" rx="6" fill="#ff8f00" filter="url(#shadow)"/>
    <text x="965" y="303" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">Task / TaskResult</text>
    <text x="965" y="317" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">(Domain Entity)</text>
  </g>
  <g data-id="MetricsCollector" data-kind="class">
    <rect x="1090" y="285" width="90" height="50" rx="6" fill="#5e35b1" filter="url(#shadow)"/>
    <text x="1135" y="303" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">Metrics</text>
    <text x="1135" y="317" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">Collector</text>
  </g>
  <g data-id="InMemoryTaskStore" data-kind="class">
    <rect x="80" y="445" width="205" height="50" rx="6" fill="#c62828" filter="url(#shadow)"/>
    <text x="182" y="463" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">InMemoryTaskStore</text>
    <text x="182" y="477" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">(main 装配)</text>
  </g>
  <g data-id="ExponentialBackoffPolicy" data-kind="class">
    <rect x="308" y="445" width="215" height="50" rx="6" fill="#c62828" filter="url(#shadow)"/>
    <text x="415" y="463" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">ExponentialBackoff</text>
    <text x="415" y="477" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">Policy (main 装配)</text>
  </g>
  <g data-id="FixedBackoffPolicy" data-kind="class">
    <rect x="546" y="445" width="195" height="50" rx="6" fill="#d32f2f" filter="url(#shadow)"/>
    <text x="643" y="470" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">FixedBackoffPolicy</text>
  </g>
  <g data-id="ConsoleNotifier" data-kind="class">
    <rect x="80" y="505" width="195" height="50" rx="6" fill="#e65100" filter="url(#shadow)"/>
    <text x="177" y="530" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">ConsoleNotifier</text>
  </g>
  <g data-id="CallbackNotifier" data-kind="class">
    <rect x="300" y="505" width="195" height="50" rx="6" fill="#e65100" filter="url(#shadow)"/>
    <text x="397" y="530" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">CallbackNotifier</text>
  </g>
  <g data-id="CompositeNotifier" data-kind="class">
    <rect x="520" y="505" width="200" height="50" rx="6" fill="#e65100" filter="url(#shadow)"/>
    <text x="620" y="523" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">CompositeNotifier</text>
    <text x="620" y="537" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">(main 装配)</text>
  </g>
  <g data-id="SystemClock" data-kind="class">
    <rect x="750" y="505" width="165" height="50" rx="6" fill="#b71c1c" filter="url(#shadow)"/>
    <text x="832" y="523" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">SystemClock</text>
    <text x="832" y="537" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">(main 装配)</text>
  </g>
  <g data-id="TaskQueue" data-kind="class">
    <rect x="750" y="445" width="195" height="50" rx="6" fill="#c62828" filter="url(#shadow)"/>
    <text x="847" y="463" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">TaskQueue</text>
    <text x="847" y="477" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">(priority queue)</text>
  </g>
  <g data-id="EngineConfig" data-kind="class">
    <rect x="960" y="445" width="175" height="50" rx="6" fill="#00695c" filter="url(#shadow)"/>
    <text x="1047" y="463" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">EngineConfig</text>
    <text x="1047" y="477" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">ConfigLoader</text>
  </g>
  <g data-id="TaskQueueLegacy" data-kind="class">
    <rect x="100" y="710" width="210" height="50" rx="6" fill="#9e9e9e" filter="url(#shadow)"/>
    <text x="205" y="728" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">TaskQueueLegacy</text>
    <text x="205" y="742" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">全仓库无人调用</text>
  </g>
  <g data-id="ILogger" data-kind="interface">
    <rect x="340" y="710" width="210" height="50" rx="6" fill="#9e9e9e" filter="url(#shadow)"/>
    <text x="445" y="728" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">ILogger / ConsoleLogger</text>
    <text x="445" y="742" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">Scheduler 未使用</text>
  </g>
  <g data-id="PersistentTaskStore" data-kind="class">
    <rect x="580" y="710" width="225" height="50" rx="6" fill="#757575" filter="url(#shadow)"/>
    <text x="692" y="728" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">PersistentTaskStore</text>
    <text x="692" y="742" font-family="monospace" font-size="12" text-anchor="middle" fill="#fff">(main 未装配)</text>
  </g>
  </g>
  <g data-role="edges">
  <line data-from="main" data-to="Scheduler" data-kind="depends"
        x1="600" y1="122" x2="250" y2="175"
        stroke="#1565c0" stroke-width="2" marker-end="url(#arr-depends)"/>
  <line data-from="Scheduler" data-to="ITaskStore" data-kind="depends"
        x1="200" y1="235" x2="170" y2="285"
        stroke="#2e7d32" stroke-width="2" marker-end="url(#arr-depends)"/>
  <line data-from="Scheduler" data-to="IRetryPolicy" data-kind="depends"
        x1="235" y1="235" x2="368" y2="285"
        stroke="#2e7d32" stroke-width="2" marker-end="url(#arr-depends)"/>
  <line data-from="Scheduler" data-to="INotifier" data-kind="depends"
        x1="280" y1="235" x2="568" y2="285"
        stroke="#2e7d32" stroke-width="2" marker-end="url(#arr-depends)"/>
  <line data-from="Scheduler" data-to="IClock" data-kind="depends"
        x1="300" y1="235" x2="758" y2="285"
        stroke="#2e7d32" stroke-width="2" marker-end="url(#arr-depends)"/>
  <line data-from="Scheduler" data-to="MetricsCollector" data-kind="depends"
        x1="350" y1="225" x2="1135" y2="285"
        stroke="#2e7d32" stroke-width="2" marker-end="url(#arr-depends)"/>
  <line data-from="Scheduler" data-to="WorkerPool" data-kind="depends"
        x1="380" y1="205" x2="420" y2="205"
        stroke="#2e7d32" stroke-width="2" marker-end="url(#arr-depends)"/>
  <line data-from="WorkerPool" data-to="Worker" data-kind="depends"
        x1="640" y1="205" x2="680" y2="205"
        stroke="#388e3c" stroke-width="2" marker-end="url(#arr-depends)"/>
  <line data-from="Scheduler" data-to="TaskQueue" data-kind="depends"
        x1="380" y1="220" x2="810" y2="445"
        stroke="#2e7d32" stroke-width="2" marker-end="url(#arr-depends)"/>
  <line data-from="Worker" data-to="TaskQueue" data-kind="depends"
        x1="770" y1="235" x2="848" y2="445"
        stroke="#43a047" stroke-width="2" marker-end="url(#arr-depends)"/>
  <line data-from="ITaskStore" data-to="InMemoryTaskStore" data-kind="depends"
        x1="170" y1="335" x2="183" y2="445"
        stroke="#0d47a1" stroke-width="2" marker-end="url(#arr-impl)"/>
  <line data-from="IRetryPolicy" data-to="ExponentialBackoffPolicy" data-kind="depends"
        x1="368" y1="335" x2="415" y2="445"
        stroke="#0d47a1" stroke-width="2" marker-end="url(#arr-impl)"/>
  <line data-from="INotifier" data-to="CallbackNotifier" data-kind="depends"
        x1="568" y1="335" x2="415" y2="495"
        stroke="#0d47a1" stroke-width="2" marker-end="url(#arr-impl)"/>
  <line data-from="INotifier" data-to="CompositeNotifier" data-kind="depends"
        x1="568" y1="335" x2="620" y2="505"
        stroke="#0d47a1" stroke-width="2" marker-end="url(#arr-impl)"/>
  <line data-from="IClock" data-to="SystemClock" data-kind="depends"
        x1="758" y1="335" x2="832" y2="505"
        stroke="#0d47a1" stroke-width="2" marker-end="url(#arr-impl)"/>
  <line data-from="Worker" data-to="Task" data-kind="depends"
        x1="770" y1="235" x2="965" y2="285"
        stroke="#888888" stroke-width="2" marker-end="url(#arr-uses)" stroke-dasharray="4,3"/>
</g>

  <rect x="50" y="775" width="1100" height="20" rx="4" fill="none"/>
  <text x="600" y="792" font-family="sans-serif" font-size="11" fill="#757575" text-anchor="middle" font-style="italic">依赖方向从上到下；Scheduler 依赖抽象接口，具体实现由 main() 组合根注入</text>
</svg>
