<text x="710.0" y="38" font-size="22" font-weight="700" text-anchor="middle" fill="#1f2d3d">TaskForge 类关系图（implements / composes / aggregates / uses；依赖画到抽象接口）</text>
<text x="710" y="805" font-size="11.5" fill="#5a6b7b" text-anchor="middle" font-weight="400">陷阱处理：Scheduler 对存储/重试/通知的聚合边一律画到抽象接口（ITaskStore/IRetryPolicy/INotifier），不画到具体类；具体实现由组合根 main 装配。PersistentTaskStore / FixedBackoffPolicy 虽实现接口但运行时未被实例化（红色，死代码标注）。</text>
