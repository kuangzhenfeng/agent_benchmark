<rect x="40" y="76" width="880" height="100" rx="10" fill="#eaf2fb" stroke="#bcd5ee" opacity="0.6"/>
<text x="56" y="98" font-size="13" font-weight="700" fill="#33475b">L4 应用入口 / 组合根（main：装配所有具体实现）</text>
<rect x="40" y="196" width="880" height="100" rx="10" fill="#e3f3ea" stroke="#a7dcc0" opacity="0.6"/>
<text x="56" y="218" font-size="13" font-weight="700" fill="#33475b">L3 编排核心（Orchestration）</text>
<rect x="40" y="316" width="880" height="100" rx="10" fill="#fdf3e1" stroke="#eccfa3" opacity="0.6"/>
<text x="56" y="338" font-size="13" font-weight="700" fill="#33475b">L2 执行单元（Execution）</text>
