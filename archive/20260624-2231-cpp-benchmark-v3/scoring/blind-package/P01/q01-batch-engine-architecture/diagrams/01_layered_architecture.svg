<text x="56" y="578" font-size="13" font-weight="700" fill="#33475b">L0 基础设施 / 值类型（Foundation）</text>
<rect x="940" y="316" width="240" height="100" rx="10" fill="#fbeaea" stroke="#e6b8b8" opacity="0.6"/>
<text x="956" y="338" font-size="13" font-weight="700" fill="#b03a3a">死代码 / 历史遗留（编译进产物，无人调用）</text>
<text x="600" y="705" font-size="11.5" fill="#5a6b7b" text-anchor="middle" font-weight="400">分层依据真实依赖方向：main 仅装配具体实现；Scheduler 只持有抽象接口指针；TaskQueueLegacy 全仓库无人调用 → 不进入主流依赖，归入死代码侧栏。</text>
