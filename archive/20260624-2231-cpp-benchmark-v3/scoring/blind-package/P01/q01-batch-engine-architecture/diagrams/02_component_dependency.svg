<text x="600" y="705" font-size="11.5" fill="#5a6b7b" text-anchor="middle" font-weight="400">关键区分：Worker→Scheduler 是经 set_completion_handler 运行时注入的回调（worker.hpp 不 include scheduler.hpp），不是编译期循环依赖。回调边用橙色虚线，编译期依赖用灰实线。</text>
