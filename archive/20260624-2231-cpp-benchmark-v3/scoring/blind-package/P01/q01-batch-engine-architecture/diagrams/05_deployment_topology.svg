<rect x="0" y="0" width="1200" height="880" fill="#fbfcfd"/>
<text x="600.0" y="38" font-size="22" font-weight="700" text-anchor="middle" fill="#1f2d3d">TaskForge 部署 / 运行时拓扑图（进程 · 线程 · 实例 · 共享汇合点）</text>
<rect x="40" y="70" width="820" height="720" rx="10" fill="#f4f8fc" stroke="#bcd5ee" opacity="0.6"/>
<text x="60" y="96" font-size="13" fill="#2f6db5" text-anchor="start" font-weight="700">Process：TaskForge（./run_public_checks.sh 编译出的单一可执行）</text>
<rect x="900" y="70" width="270" height="300" rx="10" fill="#fbeaea" stroke="#e6b8b8" opacity="0.6"/>
<text x="916" y="92" font-size="13" font-weight="700" fill="#b03a3a">编译进产物，运行时未实例化 / 无人调用</text>
<text x="430" y="815" font-size="11.5" fill="#5a6b7b" text-anchor="middle" font-weight="400">运行时真实拓扑：1 个 Scheduler 栈实例 + 1 个共享 TaskQueue + 4 个 worker 线程（worker_count=4，ConfigLoader::default_for(&quot;default&quot;)）。右侧红框为编译进产物但 main 从未实例化或无人调用的类型。</text>
