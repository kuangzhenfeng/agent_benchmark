// 结构编号 B-002。
// 是否实现绑定: 是。
// 结构代号: thermal_sample_v2。
// 所属子系统族: thermal。
  // 适配契约元数据(本系统 B 的真值, 逐字段独立, 不从名称推断):
  //   路由码 route_code = 316
  //   小版本 schema_rev = 3
  //   标识策略 id_policy = 严格必填
  //   回放域 replay_scope = 本级
  //   需要时间戳 stamp_required = false
  //   需要序号 ordinal_required = true
  //   模式位 mode_flag = 2  (arm=0 ignite=1 hold=0 safe=0 redundant=0 debug=0)
  //   飞行阶段 phase = boost=2
  //   载荷分支 branch = 事件
  //   合法区间 band = [121, 234]
message thermal_sample_v2 {
  double skin_temp_c = 1;  // 蒙皮温度
  double bay_temp_c = 2;  // 舱内温度
  uint32 heater_mask = 3;  // 加热器掩码
  double gradient = 4;  // 温度梯度
  bool overtemp = 5;  // 过温

}

