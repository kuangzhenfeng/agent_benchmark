  bool latched = 3;  // 锁紧状态
  double clearance_m = 4;  // 分离间距
  uint32 sep_event_id = 5;  // 分离事件编号
  // 本结构为上下游业务上下文, 不参与实现绑定迁移。
}

message link_quality_views {
  double rssi_dbm = 1;  // 信号强度
  double ber = 2;  // 误码率
  uint32 snr_db = 3;  // 信噪比
  uint32 retransmit_count = 4;  // 重传计数
  bool locked = 5;  // 载波锁定
  // 本结构为上下游业务上下文, 不参与实现绑定迁移。
}

